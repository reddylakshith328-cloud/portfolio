<!DOCTYPE html>
<html>

    <title>Portfolio</title>
    <style>
        body {
            background-color: #f9f9f9;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

       
        .heading1 {
            background-color: #2c3e50;
            color: #f1f1f1;
            text-align: center;
            padding: 20px;
        }

        .heading1 h1 {
            font-size: 32px;
            margin: 0;
        }

        .heading1 p {
            font-size: 16px;
            margin: 5px 0 0;
            color: #dcdcdc;
        }

        
        .primary1 {
            background-color: #34495e;
            text-align: center;
            padding: 10px;
        }

        .primary1 a {
            text-decoration: none;
        }

        .primary1 button {
            background-color: #5dade2;
            border: none;
            color: #fff;
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .primary1 button:hover {
            background-color: #2ecc71;
            transform: scale(1.05);
        }

      
        .box1 {
            border: 1px solid #ccc;
            background-color: #ffffff;
            width: 350px;
            padding: 15px;
            margin: 20px;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .box1 h1 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        .box1 ul {
            list-style-type: square;
            padding-left: 20px;
        }
        .box1 li {
            margin: 5px 0;
            color: #333;
        }

       
        .rightbox {
            margin: 20px;
        }
        .rightbox h2 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 20px;
        }
        .project-card {
            border: 1px solid #ccc;
            background-color: #ffffff;
            padding: 15px;
            margin: 15px auto;
            width: 80%;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .project-card:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .project-card h3 {
            margin: 0 0 10px;
            font-size: 20px;
            color: #2c3e50;
        }
        .project-card p {
            margin: 0;
            font-size: 15px;
            color: #555;
        }

        
        .footer {
            background-color: #2c3e50;
            color: #f1f1f1;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
        
    </style>
</head>
